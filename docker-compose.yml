services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CORS_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
    volumes:
      - chroma_data:/app/data/rag/index

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  chroma_data:
  n8n_data:
